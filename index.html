<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOD PLACE — Exhibition Teaser</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. 디자인 시스템 정의 (Colorful & Minimal) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { scroll-behavior: smooth; }
        
        /* PC 화면에서는 폰 배경 역할을 하도록 세팅 */
        body {
            font-family: 'Nanum Gothic', sans-serif;
            color: #2d2926;
            line-height: 1.8;
            background-color: #e9e9e9; /* PC에서 보이는 바깥 배경색 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        h1, h2, h3, blockquote {
            font-family: 'Nanum Myeongjo', serif;
            font-weight: 700;
        }

        /* --- 모바일 비율을 유지하는 메인 래퍼 --- */
        #mobile-wrap {
            width: 100%;
            max-width: 430px; /* 일반적인 스마트폰 최대 너비 */
            height: 100vh;
            max-height: 932px; /* 세로가 너무 긴 모니터 방지용 한계선 */
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #fdf9f2;
            
            /* 기존 배경 설정 이동 */
            background-image: linear-gradient(
                                to right, 
                                rgba(255, 255, 255, 0) 0%, 
                                rgba(255, 255, 255, 0) 15%, 
                                rgba(255, 255, 255, 0.95) 15%, 
                                rgba(255, 255, 255, 0.95) 85%, 
                                rgba(255, 255, 255, 0) 85%, 
                                rgba(255, 255, 255, 0) 100%
                              ), 
                              url('포스터.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* 휴대폰 화면처럼 그림자 효과 */
        }

        /* --- SECTION 1: HERO & COUNTDOWN --- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #2d2926;
            padding: 0 20px;
        }

        /* 모바일 너비에 맞게 폰트 크기 비율 축소 */
        .hero-content p.date {
            font-size: 1rem;
            letter-spacing: 0.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            color: #000;
        }

        /* GOOD PLACE 제목 크기 추가 축소 */
        .hero-content h1 {
            font-size: 2.2rem; /* 3rem에서 2.2rem으로 축소 */
            letter-spacing: 0.3rem;
            border-top: 2px solid #2d2926;
            border-bottom: 2px solid #2d2926;
            padding: 15px 0;
            margin-bottom: 40px;
            display: inline-block;
        }

        /* 첫 페이지 중앙 카운트다운 타이머 */
        .hero-countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 35px;
        }

        .time-box {
            text-align: center;
            min-width: 60px;
        }

        .time-box span {
            font-size: 2.2rem;
            font-weight: 700;
            display: block;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .time-box p.label {
            font-size: 0.7rem;
            letter-spacing: 0.2rem;
            margin-top: 8px;
            opacity: 0.8;
            font-weight: bold;
        }

        /* 작가 라인업 리스트 */
        .artist-list {
            font-size: 0.85rem;
            letter-spacing: 0.15rem;
            color: #333;
            font-weight: 500;
            margin-top: 15px;
            word-break: keep-all;
            padding: 10px 0;
            opacity: 0.75; 
            line-height: 2.2; /* 두 줄 간격 조정 */
        }

        .artist-list span {
            display: inline-block;
            margin: 0 4px;
        }
    </style>
</head>
<body>

    <!-- 모바일 화면 비율을 잡아주는 래퍼 -->
    <div id="mobile-wrap">
        <section class="hero-section">
            <div class="hero-content">
                <p class="date">2026. 08. 01</p>
                <h1>GOOD PLACE</h1>
                
                <div class="hero-countdown" id="main-countdown">
                    <div class="time-box"><span id="days">00</span><p class="label">DAYS</p></div>
                    <div class="time-box"><span id="hours">00</span><p class="label">HOURS</p></div>
                    <div class="time-box"><span id="minutes">00</span><p class="label">MINS</p></div>
                    <div class="time-box"><span id="seconds">00</span><p class="label">SECS</p></div>
                </div>

                <!-- 작가 이름 4명씩 2줄로 분리 -->
                <div class="artist-list">
                    <span>강보민</span> · <span>김국희</span> · <span>남윤주</span> · <span>라유</span><br>
                    <span>백권도</span> · <span>이미지</span> · <span>이수형</span> · <span>하수현</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 초대장 삭제로 인해 스크롤 기능은 동작하지 않지만, 기존 스크립트 설정 유지를 위해 남겨둠
        const faders = document.querySelectorAll('.fade-in-section');
        const appearOptions = { threshold: 0.2, rootMargin: "0px 0px -50px 0px" };

        const appearOnScroll = new IntersectionObserver(function(entries, observer) {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            });
        }, appearOptions);

        faders.forEach(fader => { appearOnScroll.observe(fader); });

        const targetDate = new Date("August 1, 2026 00:00:00").getTime();
        const daysEl = document.getElementById("days");
        const hoursEl = document.getElementById("hours");
        const minutesEl = document.getElementById("minutes");
        const secondsEl = document.getElementById("seconds");

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById("main-countdown").innerHTML = "<p style='font-size:1.5rem; letter-spacing: 0.3rem;'>EXHIBITION OPENED</p>";
                return;
            }

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            daysEl.innerText = String(d).padStart(2, '0');
            hoursEl.innerText = String(h).padStart(2, '0');
            minutesEl.innerText = String(m).padStart(2, '0');
            secondsEl.innerText = String(s).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
