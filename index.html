<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOD PLACE — Exhibition Teaser</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. 기본 설정 초기화 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* PC에서 보일 때 배경(여백) 색상 */
        body {
            font-family: 'Nanum Gothic', sans-serif;
            color: #2d2926;
            line-height: 1.8;
            background-color: #e9e9e9; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        h1, h2, h3, blockquote {
            font-family: 'Nanum Myeongjo', serif;
            font-weight: 700;
        }

        /* --- 2. 스마트폰 및 PC 공통 레이아웃 (모바일 우선) --- */
        #mobile-wrap {
            width: 100%;
            /* 모바일 주소창을 고려한 동적 높이(dvh) 적용 */
            min-height: 100dvh; 
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            
            /* 수정된 부분: 화면 전체에 균일한 85% 불투명도의 흰색을 덮음 */
            background-image: linear-gradient(
                                rgba(255, 255, 255, 0.85), 
                                rgba(255, 255, 255, 0.85)
                              ), 
                              url('포스터.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* --- SECTION 1: HERO & COUNTDOWN --- */
        .hero-section {
            position: relative;
            width: 100%;
            min-height: inherit; /* 부모의 높이를 그대로 상속 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #2d2926;
            padding: 0 5%; 
            width: 100%;
        }

        .hero-content p.date {
            font-size: clamp(0.9rem, 3vw, 1rem); 
            letter-spacing: 0.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            color: #000;
        }

        /* GOOD PLACE 제목 */
        .hero-content h1 {
            font-size: clamp(1.8rem, 7vw, 2.4rem); 
            letter-spacing: 0.3rem;
            border-top: 2px solid #2d2926;
            border-bottom: 2px solid #2d2926;
            padding: 15px 0;
            margin-bottom: 35px;
            display: inline-block;
        }

        /* 카운트다운 타이머 */
        .hero-countdown {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 3vw, 15px); 
            margin-top: 20px;
            margin-bottom: 35px;
        }

        .time-box {
            text-align: center;
            flex: 1; 
            max-width: 70px;
        }

        .time-box span {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: 700;
            display: block;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .time-box p.label {
            font-size: clamp(0.6rem, 2vw, 0.7rem);
            letter-spacing: 0.2rem;
            margin-top: 8px;
            opacity: 0.8;
            font-weight: bold;
        }

        /* 작가 라인업 리스트 */
        .artist-list {
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            letter-spacing: 0.15rem;
            color: #333;
            font-weight: 500;
            margin-top: 15px;
            word-break: keep-all;
            padding: 10px 0;
            opacity: 0.75; 
            line-height: 2.2; 
        }

        .artist-list span {
            display: inline-block;
            margin: 0 3px;
        }

        /* --- 3. PC 화면 전용 스타일 (미디어 쿼리) --- */
        @media (min-width: 500px) {
            #mobile-wrap {
                max-width: 430px; 
                min-height: auto;
                height: 90vh; 
                max-height: 900px; 
                border-radius: 30px; 
                box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            }
        }
    </style>
</head>
<body>

    <!-- 모바일 화면 비율을 잡아주는 래퍼 -->
    <div id="mobile-wrap">
        <section class="hero-section">
            <div class="hero-content">
                <p class="date">2026. 08. 01</p>
                <h1>GOOD PLACE</h1>
                
                <div class="hero-countdown" id="main-countdown">
                    <div class="time-box"><span id="days">00</span><p class="label">DAYS</p></div>
                    <div class="time-box"><span id="hours">00</span><p class="label">HOURS</p></div>
                    <div class="time-box"><span id="minutes">00</span><p class="label">MINS</p></div>
                    <div class="time-box"><span id="seconds">00</span><p class="label">SECS</p></div>
                </div>

                <!-- 작가 이름 4명씩 2줄로 분리 -->
                <div class="artist-list">
                    <span>강보민</span> · <span>김국희</span> · <span>남윤주</span> · <span>라유</span><br>
                    <span>백권도</span> · <span>이미지</span> · <span>이수형</span> · <span>하수현</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        const targetDate = new Date("August 1, 2026 00:00:00").getTime();
        const daysEl = document.getElementById("days");
        const hoursEl = document.getElementById("hours");
        const minutesEl = document.getElementById("minutes");
        const secondsEl = document.getElementById("seconds");

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById("main-countdown").innerHTML = "<p style='font-size:1.5rem; letter-spacing: 0.3rem;'>EXHIBITION OPENED</p>";
                return;
            }

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            daysEl.innerText = String(d).padStart(2, '0');
            hoursEl.innerText = String(h).padStart(2, '0');
            minutesEl.innerText = String(m).padStart(2, '0');
            secondsEl.innerText = String(s).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
